<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdvFlow Pro - Sistema Jurídico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0f1c 0%, #0a1628 100%); font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .glass-card { background: rgba(15, 30, 50, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.25); border-radius: 16px; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .status-aguardando { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-andamento { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-concluido { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .process-card { background: rgba(25, 45, 65, 0.95); border-left: 3px solid #3b82f6; border-radius: 10px; cursor: pointer; margin-bottom: 10px; padding: 12px; }
        .process-card:hover { transform: translateX(4px); }
        .input-modern { background: rgba(10, 20, 35, 0.8); border: 1px solid #2d4a6e; border-radius: 10px; padding: 8px 12px; color: #e2e8f0; width: 100%; }
        .input-modern:focus { border-color: #3b82f6; outline: none; }
        .kanban-column { background: rgba(8, 18, 30, 0.5); border-radius: 16px; border: 1px solid rgba(59, 130, 246, 0.2); min-height: 500px; padding: 12px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { background: rgba(30, 50, 70, 0.6); padding: 12px; text-align: left; }
        .data-table td { padding: 12px; border-bottom: 1px solid rgba(59, 130, 246, 0.1); }
        .data-table tr:hover { background: rgba(59, 130, 246, 0.1); cursor: pointer; }
        .modal-glass { background: linear-gradient(135deg, rgba(15, 30, 55, 0.98), rgba(10, 22, 45, 0.98)); border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 rounded-xl p-3"><i class="fas fa-scale-balanced text-2xl text-white"></i></div>
                <div><h1 class="text-2xl font-bold">AdvFlow Pro</h1><p class="text-xs text-gray-400">Sistema Jurídico - MongoDB</p></div>
            </div>
            <div class="flex gap-2">
                <div class="bg-blue-900/30 rounded-lg px-3 py-1.5"><i class="fas fa-calendar-alt text-blue-400"></i> <span id="dataAtual" class="text-sm"></span></div>
                <div class="bg-blue-900/30 rounded-lg px-3 py-1.5"><i class="fas fa-clock text-blue-400"></i> <span id="horaAtual" class="text-sm"></span></div>
            </div>
        </div>

        <!-- Botões -->
        <div class="flex gap-3 mb-6">
            <button onclick="abrirModalProcesso()" class="btn-primary px-4 py-2 rounded-lg"><i class="fas fa-plus mr-2"></i>Novo Processo</button>
            <button onclick="carregarTodosDados()" class="bg-gray-700 px-4 py-2 rounded-lg"><i class="fas fa-sync-alt mr-2"></i>Atualizar</button>
        </div>

        <!-- Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-4"><p class="text-gray-400 text-sm">Total Processos</p><p class="text-3xl font-bold text-blue-400" id="totalProcessos">0</p></div>
            <div class="glass-card p-4"><p class="text-gray-400 text-sm">Ativos</p><p class="text-3xl font-bold text-green-400" id="processosAtivos">0</p></div>
            <div class="glass-card p-4"><p class="text-gray-400 text-sm">Taxa Êxito</p><p class="text-3xl font-bold text-yellow-400" id="taxaExito">0%</p></div>
            <div class="glass-card p-4"><p class="text-gray-400 text-sm">Valor em Causa</p><p class="text-3xl font-bold text-orange-400" id="valorCausaTotal">R$ 0</p></div>
        </div>

        <!-- Kanban -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="kanban-column"><h3 class="font-bold mb-3 text-yellow-400"><i class="fas fa-hourglass-half mr-2"></i>Aguardando</h3><div id="kanban-aguardando"></div></div>
            <div class="kanban-column"><h3 class="font-bold mb-3 text-blue-400"><i class="fas fa-spinner mr-2"></i>Em Andamento</h3><div id="kanban-andamento"></div></div>
            <div class="kanban-column"><h3 class="font-bold mb-3 text-green-400"><i class="fas fa-check-circle mr-2"></i>Concluídos</h3><div id="kanban-concluido"></div></div>
        </div>

        <!-- Tabela -->
        <div class="glass-card overflow-hidden">
            <div class="p-4 border-b"><h2 class="font-bold"><i class="fas fa-database text-blue-400 mr-2"></i>Banco de Processos</h2></div>
            <div class="overflow-x-auto">
                <table class="data-table"><thead><tr><th>Nº Processo</th><th>Cliente</th><th>Parte Contrária</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead><tbody id="listaProcessos"></tbody></table>
            </div>
        </div>
    </div>

    <!-- Modal Processo -->
    <div id="modalProcesso" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50"><div class="modal-glass w-full max-w-md mx-4 p-6"><div class="flex justify-between mb-4"><h3 class="text-xl font-bold" id="modalTitulo">Novo Processo</h3><button onclick="fecharModal('modalProcesso')" class="text-gray-400 text-2xl">&times;</button></div><form id="formProcesso"><input type="hidden" id="processoId"><input type="text" id="numeroProcesso" placeholder="Nº Processo" class="input-modern mb-3" required><input type="text" id="cliente" placeholder="Cliente" class="input-modern mb-3" required><input type="text" id="parteContraria" placeholder="Parte Contrária" class="input-modern mb-3"><input type="number" id="valorCausa" placeholder="Valor da Causa" class="input-modern mb-3"><input type="number" id="honorarios" placeholder="Honorários" class="input-modern mb-3"><select id="status" class="input-modern mb-3"><option value="aguardando">Aguardando</option><option value="andamento">Em Andamento</option><option value="concluido">Concluído</option></select><div class="flex gap-3"><button type="submit" class="flex-1 bg-green-600 py-2 rounded-lg">Salvar</button><button type="button" onclick="fecharModal('modalProcesso')" class="flex-1 bg-gray-600 py-2 rounded-lg">Cancelar</button></div></form></div></div>

    <script>
        const API_URL = '/api';
        let processos = [];

        async function apiRequest(endpoint, method = 'GET', data = null) {
            try {
                const options = { method, headers: { 'Content-Type': 'application/json' } };
                if (data) options.body = JSON.stringify(data);
                const res = await fetch(`${API_URL}/${endpoint}`, options);
                return await res.json();
            } catch (error) {
                console.error('Erro:', error);
                return { success: false, error: error.message };
            }
        }

        async function carregarTodosDados() {
            await carregarProcessos();
            await carregarDashboard();
        }

        async function carregarProcessos() {
            const result = await apiRequest('processos');
            if (result.success && result.data) {
                processos = result.data;
                atualizarTabela();
                atualizarKanban();
            } else {
                console.error('Erro ao carregar processos:', result.error);
            }
        }

        async function carregarDashboard() {
            const result = await apiRequest('dashboard');
            if (result.success) {
                document.getElementById('totalProcessos').innerText = result.data.totalProcessos || 0;
                document.getElementById('processosAtivos').innerText = result.data.processosAtivos || 0;
                document.getElementById('taxaExito').innerText = `${result.data.taxaExito || 0}%`;
                document.getElementById('valorCausaTotal').innerText = formatarMoeda(result.data.valorCausaTotal);
            }
        }

        function atualizarTabela() {
            const tbody = document.getElementById('listaProcessos');
            if (processos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-500">Nenhum processo cadastrado</td></tr>';
                return;
            }
            tbody.innerHTML = processos.map(p => `
                <tr onclick="editarProcesso('${p._id}')">
                    <td class="p-3">${p.numero}</td><td class="p-3">${p.cliente}</td><td class="p-3">${p.parteContraria || '—'}</td><td class="p-3">${formatarMoeda(p.valorCausa)}</td>
                    <td class="p-3"><span class="status-badge status-${p.status}">${p.status === 'aguardando' ? 'Aguardando' : (p.status === 'andamento' ? 'Andamento' : 'Concluído')}</span></td>
                    <td class="p-3"><button onclick="event.stopPropagation(); excluirProcesso('${p._id}')" class="text-red-400"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        function atualizarKanban() {
            const statuses = ['aguardando', 'andamento', 'concluido'];
            statuses.forEach(status => {
                const container = document.getElementById(`kanban-${status}`);
                const filtrados = processos.filter(p => p.status === status);
                if (filtrados.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 py-4">Nenhum processo</div>';
                } else {
                    container.innerHTML = filtrados.map(p => `
                        <div class="process-card" onclick="editarProcesso('${p._id}')">
                            <div><strong>${p.numero}</strong></div>
                            <div class="text-xs text-gray-400">${p.cliente}</div>
                            <div class="text-xs text-green-400 mt-1">${formatarMoeda(p.valorCausa)}</div>
                        </div>
                    `).join('');
                }
            });
        }

        async function salvarProcesso(event) {
            event.preventDefault();
            const id = document.getElementById('processoId').value;
            const processo = {
                numero: document.getElementById('numeroProcesso').value,
                cliente: document.getElementById('cliente').value,
                parteContraria: document.getElementById('parteContraria').value,
                valorCausa: parseFloat(document.getElementById('valorCausa').value) || 0,
                honorarios: parseFloat(document.getElementById('honorarios').value) || 0,
                status: document.getElementById('status').value
            };
            
            let result;
            if (id) {
                result = await apiRequest(`processos?id=${id}`, 'PUT', processo);
            } else {
                result = await apiRequest('processos', 'POST', processo);
            }
            
            if (result.success) {
                fecharModal('modalProcesso');
                document.getElementById('formProcesso').reset();
                await carregarTodosDados();
                Swal.fire({ icon: 'success', title: 'Sucesso!', text: 'Processo salvo!', timer: 1500, showConfirmButton: false });
            } else {
                Swal.fire({ icon: 'error', title: 'Erro', text: result.error || 'Falha ao salvar' });
            }
        }

        async function editarProcesso(id) {
            const p = processos.find(p => p._id === id);
            if (p) {
                document.getElementById('modalTitulo').innerText = 'Editar Processo';
                document.getElementById('processoId').value = p._id;
                document.getElementById('numeroProcesso').value = p.numero;
                document.getElementById('cliente').value = p.cliente;
                document.getElementById('parteContraria').value = p.parteContraria || '';
                document.getElementById('valorCausa').value = p.valorCausa;
                document.getElementById('honorarios').value = p.honorarios;
                document.getElementById('status').value = p.status;
                abrirModal('modalProcesso');
            }
        }

        async function excluirProcesso(id) {
            Swal.fire({ title: 'Confirmar', text: 'Deseja excluir?', icon: 'warning', showCancelButton: true }).then(async (result) => {
                if (result.isConfirmed) {
                    const res = await apiRequest(`processos?id=${id}`, 'DELETE');
                    if (res.success) {
                        await carregarTodosDados();
                        Swal.fire('Excluído!', '', 'success');
                    }
                }
            });
        }

        function formatarMoeda(valor) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(valor || 0); }

        function abrirModalProcesso() { document.getElementById('formProcesso').reset(); document.getElementById('processoId').value = ''; document.getElementById('modalTitulo').innerText = 'Novo Processo'; abrirModal('modalProcesso'); }
        function fecharModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
        function abrirModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }

        function atualizarDataHora() {
            const agora = new Date();
            document.getElementById('dataAtual').innerText = agora.toLocaleDateString('pt-BR');
            document.getElementById('horaAtual').innerText = agora.toLocaleTimeString('pt-BR');
        }

        document.getElementById('formProcesso')?.addEventListener('submit', salvarProcesso);
        
        atualizarDataHora();
        setInterval(atualizarDataHora, 1000);
        carregarTodosDados();
    </script>
</body>
</html>
